name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Gate the release build on the full CI suite (lint + unit + e2e) so a
  # broken tag never ships installers.
  test:
    uses: ./.github/workflows/ci.yml

  build-mac:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build && npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            release/*.dmg
            release/latest-mac.yml

      - if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload "${{ github.ref_name }}" release/*.dmg release/latest-mac.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
